<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 210" fill="none" role="img" aria-label="BillingAlign logo">
  <!--
    BillingAlign — Revenue Cycle Management
    Hand-crafted SVG replica of the brand logo.
    Colors:
      Navy   #0D2242  (hexagon + "Billing" text)
      Cyan   #1AB9D8  ("Align" text)
      Gray   #8899AE  (tagline)
      White  #FFFFFF  (plus sign)
  -->

  <!-- ── Flat-top hexagon (center 90,105 · width 120 · height 145) with r=8 rounded corners ── -->
  <path
    d="M 68,33 L 112,33
       Q 120,33 123,40
       L 147,98
       Q 150,105 147,112
       L 123,171
       Q 120,178 112,178
       L 68,178
       Q 60,178 57,171
       L 33,112
       Q 30,105 33,98
       L 57,40
       Q 60,33 68,33 Z"
    fill="#0D2242"
  />

  <!-- ── White plus sign (centered at 90,105) ── -->
  <!-- horizontal bar -->
  <rect x="69" y="99.5" width="42" height="11" rx="3.5" fill="#FFFFFF"/>
  <!-- vertical bar -->
  <rect x="84.5" y="82"  width="11" height="46" rx="3.5" fill="#FFFFFF"/>

  <!-- ── Wordmark: "Billing" navy + "Align" cyan ── -->
  <text
    x="164"
    y="124"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="76"
    letter-spacing="-1"
  ><tspan fill="#0D2242">Billing</tspan><tspan fill="#1AB9D8">Align</tspan></text>

  <!-- ── Tagline ── -->
  <text
    x="167"
    y="152"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="13.5"
    letter-spacing="4"
    fill="#8899AE"
  >REVENUE CYCLE MANAGEMENT</text>

</svg>
